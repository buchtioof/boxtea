services:
  boxteadev:
    build: .
    container_name: boxteadev
    env_file:
      - .env
    environment:
      - DEBUG=True
      - SESSION_TOKEN=temporarydevkey_dontuseinprod
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    volumes:
      - .:/app
      - ./data:/app/data
    command: python manage.py runserver ${IP:-0.0.0.0}:${PORT:-8000}